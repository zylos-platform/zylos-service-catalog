spring:
  application:
    name: zylos-catalog-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    mongodb:
      auto-index-creation: false
  mongodb:
    uri: mongodb://catalog:${ZYLOS_CATALOG_MONGODB_PASSWORD}@${ZYLOS_CATALOG_MONGODB_HOST:catalog-mongodb-rs0.mongodb.svc.cluster.local}:27017/catalog?replicaSet=rs0&authSource=catalog

server:
  port: 8080
  shutdown: graceful

zylos:
  security:
    issuer-uri: ${ZYLOS_ISSUER_URI:http://keycloak.zylos.local/realms/zylos}
    jwk-set-uri: ${ZYLOS_JWK_SET_URI:http://keycloak.zylos.local/realms/zylos/protocol/openid-connect/certs}
    expected-audience: zylos-internal-catalog
    actor-chains:
      enabled: true
  kafka:
    schema-registry-url: ${ZYLOS_CATALOG_SCHEMA_REGISTRY_URL:http://schema-registry.kafka.svc.cluster.local:8081}
    auto-register-schemas: ${ZYLOS_CATALOG_AUTO_REGISTER_SCHEMAS:true}
  catalog:
    event-topic: ${ZYLOS_CATALOG_EVENT_TOPIC:catalog.product.events.v1}
  service:
    version: ${ZYLOS_SERVICE_VERSION:0.0.0}

management:
  server:
    port: 9000
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    git:
      mode: full
  metrics:
    tags:
      application: ${spring.application.name}
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      service.version: ${app.version:unknown}
      deployment.environment: ${spring.profiles.active}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://opentelemetry-collector.observability.svc.cluster.local:4318/v1/traces}
  otlp:
    metrics:
      export:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://opentelemetry-collector.observability.svc.cluster.local:4318/v1/metrics}

app:
  version: "@project.version@"
