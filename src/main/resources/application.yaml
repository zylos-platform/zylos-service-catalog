spring:
  application:
    name: zylos-catalog-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8080
  shutdown: graceful

zylos:
  security:
    issuer-uri: ${ZYLOS_ISSUER_URI:http://keycloak.zylos.local/realms/zylos}
    jwk-set-uri: ${ZYLOS_JWK_SET_URI:http://keycloak.zylos.local/realms/zylos/protocol/openid-connect/certs}
    expected-audience: zylos-internal-catalog
    actor-chains:
      enabled: true

management:
  server:
    port: 9000
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    git:
      mode: full
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      service.version: ${app.version:unknown}
      deployment.environment: ${spring.profiles.active}

app:
  version: "@project.version@"
